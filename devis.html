<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demande service</title>
<link rel="stylesheet" href="css/style.css">

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src https://formspree.io; img-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
</head>

<body>

<header class="header">
<div class="container">
<img src="iamges/logo (2).png" class="logo">
<nav>
<a href="index.html">Accueil</a>
<a href="services.html">Services</a>
<a href="devis.html">Demande service</a>
<a href="contact.html">Contact</a>
</nav>
</div>
</header>

<section class="page-hero">
<div class="page-hero-content">
<h1>Demande de service</h1>
<p>Décrivez votre besoin</p>
</div>
</section>

<section class="flex-layout">

<div class="left-box">
<h2>Pourquoi nous choisir ?</h2>
<p>✔ Solutions pro</p>
<p>✔ Support rapide</p>
</div>

<div class="right-box">

<div id="msg2" class="success-box"></div>

<form id="formDevis" onsubmit="return false;">

<input type="text" id="nom2" placeholder="Nom complet" required>

<input type="email" id="email2" placeholder="exemple@gmail.com" required>

<select id="service2" required>
<option value="">Choisir un service</option>
<option>Développement Web</option>
<option>Cybersécurité</option>
<option>Rapports PFE</option>
</select>

<textarea id="message2" placeholder="Votre demande..." required></textarea>

<button type="submit" class="btn">Envoyer</button>

</form>

</div>

</section>

<script>
const form2 = document.getElementById("formDevis");
const msg2 = document.getElementById("msg2");

form2.addEventListener("submit", async function(e){
e.preventDefault();

const nom = document.getElementById("nom2").value.trim();
const email = document.getElementById("email2").value.trim();
const service = document.getElementById("service2").value;
const message = document.getElementById("message2").value.trim();

const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!nom || !email || !service || !message){
msg2.innerHTML = "❌ Remplissez tous les champs";
return;
}

if(!emailRegex.test(email)){
msg2.innerHTML = "❌ Email invalide";
return;
}

try{
const res = await fetch("https://formspree.io/f/mlgzzllb",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Accept":"application/json"
},
body:JSON.stringify({
Nom:nom,
Email:email,
Service:service,
Message:message
})
});

if(res.ok){
form2.reset();
msg2.innerHTML = "✅ Demande envoyée avec succès 🚀";
}else{
msg2.innerHTML = "❌ Erreur";
}

}catch{
msg2.innerHTML = "❌ Connexion échouée";
}
});
</script>

</body>
</html>
