<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demande service</title>
<link rel="stylesheet" href="css/style.css">

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src https://formspree.io; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline';">
</head>

<body>

<header class="header">
  <div class="container">
    <img src="iamges/logo (2).png" class="logo">
    <nav>
      <a href="index.html">Accueil</a>
      <a href="services.html">Services</a>
      <a href="devis.html">Demande service</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="page-hero">
  <div class="page-hero-content">
    <h1>Demande de service</h1>
    <p>Décrivez votre besoin</p>
  </div>
</section>

<section class="flex-layout">

  <div class="left-box">
    <h2>Pourquoi nous choisir ?</h2>
    <p>✔ Solutions pro</p>
    <p>✔ Support rapide</p>
  </div>

  <div class="right-box">

    <div id="successDevis" class="success-box"></div>

    <!-- ❗ بدون action -->
    <form id="devisForm">

      <input type="text" name="Nom" placeholder="Nom complet" required>
      <input type="email" name="Email" placeholder="exemple@gmail.com" required>

      <select name="Service" required>
        <option value="">Choisir un service</option>
        <option>Développement Web</option>
        <option>Cybersécurité</option>
        <option>Rapports PFE</option>
      </select>

      <textarea name="Message" required></textarea>

      <button class="btn">Envoyer</button>

    </form>

  </div>

</section>

<script>
const form2 = document.getElementById("devisForm");
const success2 = document.getElementById("successDevis");

form2.addEventListener("submit", async function(e){
e.preventDefault();

const nom = form2.Nom.value.trim();
const email = form2.Email.value.trim();
const service = form2.Service.value;
const message = form2.Message.value.trim();

const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!nom || !email || !service || !message){
success2.innerHTML = "❌ Remplissez tous les champs";
return;
}

if(!emailRegex.test(email)){
success2.innerHTML = "❌ Email invalide";
return;
}

try{
const res = await fetch("https://formspree.io/f/mlgzzllb",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Accept":"application/json"
},
body:JSON.stringify({Nom:nom, Email:email, Service:service, Message:message})
});

if(res.ok){
form2.reset();
success2.innerHTML = "✅ Demande envoyée avec succès 🚀";
}else{
success2.innerHTML = "❌ Erreur";
}

}catch{
success2.innerHTML = "❌ Connexion échouée";
}
});
</script>

</body>
</html>
