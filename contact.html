<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>
<link rel="stylesheet" href="css/style.css">

<!-- SECURITY -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src https://formspree.io; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline';">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="X-XSS-Protection" content="1; mode=block">
</head>

<body>

<header class="header">
  <div class="container">
    <img src="iamges/logo (2).png" class="logo">
    <nav>
      <a href="index.html">Accueil</a>
      <a href="services.html">Services</a>
      <a href="devis.html">Demande service</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="page-hero">
  <div class="page-hero-content">
    <h1>Contactez-nous</h1>
    <p>Nous sommes disponibles pour vous aider</p>
  </div>
</section>

<section class="flex-layout">

  <div class="left-box">
    <h2>Restons en contact</h2>
    <p>📩 fatinedaouad7 [at] gmail.com</p>
    <p>📱 digital.solutions.ma</p>
    <p>✔ Réponse rapide</p>
  </div>

  <div class="right-box">

    <div id="successContact" class="success-box"></div>

    <!-- ❗❗ مهم: حيد action و method -->
    <form id="contactForm">

      <input type="text" name="Nom" placeholder="Votre nom complet" required>
      <input type="email" name="Email" placeholder="exemple@gmail.com" required>
      <textarea name="Message" placeholder="Votre message..." required></textarea>

      <button class="btn">Envoyer</button>

    </form>

  </div>

</section>

<footer class="footer">
  <div class="footer-grid">
    <div><h3>Digital Solutions</h3></div>
    <div>
      <h4>Navigation</h4>
      <a href="index.html">Accueil</a>
      <a href="services.html">Services</a>
      <a href="devis.html">Demande service</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</footer>

<script>
const form = document.getElementById("contactForm");
const success = document.getElementById("successContact");

form.addEventListener("submit", async function(e){
e.preventDefault();

const nom = form.Nom.value.trim();
const email = form.Email.value.trim();
const message = form.Message.value.trim();

const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!nom || !email || !message){
success.innerHTML = "❌ Tous les champs sont obligatoires";
return;
}

if(!emailRegex.test(email)){
success.innerHTML = "❌ Email invalide (ex: exemple@gmail.com)";
return;
}

try{
const res = await fetch("https://formspree.io/f/mlgzzllb",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Accept":"application/json"
},
body:JSON.stringify({Nom:nom, Email:email, Message:message})
});

if(res.ok){
form.reset();
success.innerHTML = "✅ Message envoyé avec succès 💙";
}else{
success.innerHTML = "❌ Erreur lors de l'envoi";
}

}catch{
success.innerHTML = "❌ Problème de connexion";
}
});
</script>

</body>
</html>
