<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>
<link rel="stylesheet" href="css/style.css">

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src https://formspree.io; img-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
</head>

<body>

<header class="header">
<div class="container">
<img src="iamges/logo (2).png" class="logo">
<nav>
<a href="index.html">Accueil</a>
<a href="services.html">Services</a>
<a href="devis.html">Demande service</a>
<a href="contact.html">Contact</a>
</nav>
</div>
</header>

<section class="page-hero">
<div class="page-hero-content">
<h1>Contactez-nous</h1>
<p>Nous sommes disponibles pour vous aider</p>
</div>
</section>

<section class="flex-layout">

<div class="left-box">
<h2>Contact</h2>
<p>📩 fatinedaouad7 [at] gmail.com</p>
<p>📱 digital.solutions.ma</p>
</div>

<div class="right-box">

<div id="msg" class="success-box"></div>

<!-- ❗❗ NO ACTION / NO METHOD -->
<form id="formContact" onsubmit="return false;">

<input type="text" id="nom" placeholder="Nom complet" required>

<input type="email" id="email" placeholder="exemple@gmail.com" required>

<textarea id="message" placeholder="Votre message..." required></textarea>

<button type="submit" class="btn">Envoyer</button>

</form>

</div>

</section>

<script>
const form = document.getElementById("formContact");
const msg = document.getElementById("msg");

form.addEventListener("submit", async function(e){
e.preventDefault();

const nom = document.getElementById("nom").value.trim();
const email = document.getElementById("email").value.trim();
const message = document.getElementById("message").value.trim();

const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

// VALIDATION
if(!nom || !email || !message){
msg.innerHTML = "❌ Tous les champs sont obligatoires";
return;
}

if(!emailRegex.test(email)){
msg.innerHTML = "❌ Email invalide (ex: exemple@gmail.com)";
return;
}

try{
const res = await fetch("https://formspree.io/f/mlgzzllb",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Accept":"application/json"
},
body:JSON.stringify({
Nom:nom,
Email:email,
Message:message
})
});

if(res.ok){
form.reset();
msg.innerHTML = "✅ Message envoyé avec succès 💙";
}else{
msg.innerHTML = "❌ Erreur lors de l'envoi";
}

}catch{
msg.innerHTML = "❌ Problème connexion";
}
});
</script>

</body>
</html>
